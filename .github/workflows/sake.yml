name: Generate Snake Contribution

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate Snake GIF (Black Background)
        uses: Platane/snk@v3
        with:
          github_user_name: TheHadrix
          outputs: |
            output/github-contribution-grid-snake.gif?color_background=#0D1117&color_snake=#00D4FF&color_dots=#161B22,#21262D,#30363D,#484F58,#6E7681

      - name: Commit & Push Snake GIF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update snake contribution GIF"
